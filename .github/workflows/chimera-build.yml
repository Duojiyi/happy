name: Chimera Secretless Build

on:
  pull_request:
    paths:
      - 'brand/chimera/**'
      - 'packages/happy-app/**'
      - 'packages/happy-wire/**'
      - 'scripts/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/chimera-build.yml'
  push:
    branches: [main]
    paths:
      - 'brand/chimera/**'
      - 'packages/happy-app/**'
      - 'packages/happy-wire/**'
      - 'scripts/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/chimera-build.yml'
  workflow_dispatch:

concurrency:
  group: chimera-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android:
    name: Build unsigned Android APK
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Chimera policy gates
        run: |
          pnpm chimera:brand:check
          pnpm chimera:client:test
          pnpm chimera:client:check
          pnpm --filter happy-app typecheck

      - name: Prepare Android build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Generate clean Android project
        run: pnpm --filter happy-app exec expo prebuild --platform android --clean

      - name: Assemble unsigned release APK
        working-directory: packages/happy-app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify candidate is unsigned and has Chimera identity
        working-directory: packages/happy-app
        run: |
          APK=$(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)
          test -n "$APK"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          AAPT2="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          VERSION_NAME=$(node --input-type=module -e "import p from '../../brand/chimera/product.json' with {type:'json'}; console.log(p.upstreamAppVersion + '-chimera.' + p.chimeraRevision)")
          VERSION_CODE=$(node --input-type=module -e "import p from '../../brand/chimera/product.json' with {type:'json'}; console.log(p.androidVersionCode)")
          if "$APKSIGNER" verify "$APK" > /tmp/chimera-apksigner.txt 2>&1; then
            echo 'Candidate APK unexpectedly verifies as signed' >&2
            cat /tmp/chimera-apksigner.txt
            exit 1
          fi
          grep -Eiq 'DOES NOT VERIFY|not verified|failed' /tmp/chimera-apksigner.txt
          "$AAPT2" dump badging "$APK" | grep -F "package: name='org.chimerahub.chimera' versionCode='$VERSION_CODE' versionName='$VERSION_NAME'"
          mkdir -p ../../dist/chimera-android
          cp "$APK" ../../dist/chimera-android/Chimera-unsigned.apk
          APK_SHA=$(sha256sum ../../dist/chimera-android/Chimera-unsigned.apk | cut -d ' ' -f 1)
          APK_SIZE=$(stat -c '%s' ../../dist/chimera-android/Chimera-unsigned.apk)
          jq -n \
            --arg commitSha "${{ github.sha }}" \
            --arg versionName "$VERSION_NAME" \
            --arg versionCode "$VERSION_CODE" \
            --arg sha256 "$APK_SHA" \
            --arg size "$APK_SIZE" \
            --arg buildRunId "${{ github.run_id }}" \
            '{schemaVersion: 1, artifactKind: "android-apk-unsigned", artifactName: "chimera-android-unsigned", commitSha: $commitSha, versionName: $versionName, versionCode: ($versionCode | tonumber), packageName: "org.chimerahub.chimera", sha256: $sha256, size: ($size | tonumber), buildRunId: $buildRunId}' \
            > ../../dist/chimera-android/release-input.json

      - name: Upload unsigned Android artifact
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: chimera-android-unsigned
          path: dist/chimera-android
          if-no-files-found: error
          retention-days: 7

  web:
    name: Build immutable Web archive
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Chimera policy gates
        run: |
          pnpm chimera:brand:check
          pnpm chimera:client:test
          pnpm chimera:client:check
          pnpm --filter happy-app typecheck

      - name: Export Web bundle
        run: pnpm --filter happy-app exec expo export --platform web --output-dir dist/chimera-web/site

      - name: Create immutable Web archive and release input
        run: |
          VERSION_NAME=$(node --input-type=module -e "import p from './brand/chimera/product.json' with {type:'json'}; console.log(p.upstreamAppVersion + '-chimera.' + p.chimeraRevision)")
          mkdir -p dist/chimera-web
          tar -C dist/chimera-web/site -czf "dist/chimera-web/Chimera-${VERSION_NAME}-web.tar.gz" .
          WEB_ARCHIVE=$(find dist/chimera-web -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)
          WEB_SHA=$(sha256sum "$WEB_ARCHIVE" | cut -d ' ' -f 1)
          WEB_SIZE=$(stat -c '%s' "$WEB_ARCHIVE")
          VERSION_CODE=$(node --input-type=module -e "import p from './brand/chimera/product.json' with {type:'json'}; console.log(p.androidVersionCode)")
          jq -n \
            --arg commitSha "${{ github.sha }}" \
            --arg versionName "$VERSION_NAME" \
            --arg versionCode "$VERSION_CODE" \
            --arg sha256 "$WEB_SHA" \
            --arg size "$WEB_SIZE" \
            --arg buildRunId "${{ github.run_id }}" \
            '{schemaVersion: 1, artifactKind: "web-archive", artifactName: "chimera-web-unsigned", commitSha: $commitSha, versionName: $versionName, versionCode: ($versionCode | tonumber), sha256: $sha256, size: ($size | tonumber), buildRunId: $buildRunId}' \
            > dist/chimera-web/release-input.json

      - name: Upload immutable Web artifact
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: chimera-web-unsigned
          path: dist/chimera-web
          if-no-files-found: error
          retention-days: 7

  provenance:
    name: Attest unsigned artifacts
    needs: [android, web]
    if: ${{ needs.android.result == 'success' && needs.web.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download Android artifact by immutable artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ needs.android.outputs.artifact-id }}
          path: provenance/android

      - name: Download Web artifact by immutable artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ needs.web.outputs.artifact-id }}
          path: provenance/web

      - name: Verify artifact digests and provenance binding
        run: |
          set -euo pipefail
          APK=$(find provenance/android -type f -name '*.apk' | head -n 1)
          WEB=$(find provenance/web -type f -name '*.tar.gz' | head -n 1)
          test -n "$APK" && test -n "$WEB"
          APK_SHA=$(sha256sum "$APK" | cut -d ' ' -f 1)
          WEB_SHA=$(sha256sum "$WEB" | cut -d ' ' -f 1)
          jq -e --arg sha "$APK_SHA" --arg commit "${{ github.sha }}" --arg run "${{ github.run_id }}" \
            '.sha256 == $sha and .commitSha == $commit and .buildRunId == $run and .artifactKind == "android-apk-unsigned" and .packageName == "org.chimerahub.chimera"' \
            provenance/android/release-input.json
          jq -e --arg sha "$WEB_SHA" --arg commit "${{ github.sha }}" --arg run "${{ github.run_id }}" \
            '.sha256 == $sha and .commitSha == $commit and .buildRunId == $run and .artifactKind == "web-archive"' \
            provenance/web/release-input.json

      - name: Attest unsigned Android APK
        uses: actions/attest-build-provenance@bd77c077858b8d561b7a36cbe48ef4cc642ca39d
        with:
          subject-path: provenance/android/**/*.apk

      - name: Attest immutable Web archive
        uses: actions/attest-build-provenance@bd77c077858b8d561b7a36cbe48ef4cc642ca39d
        with:
          subject-path: provenance/web/**/*.tar.gz
