plugins {
  id 'com.android.library'
  id 'kotlin-android'
}

group = 'org.chimerahub.chimera.updater'
version = '1.0.0'

android {
  namespace 'org.chimerahub.chimera.updater'
  compileSdkVersion rootProject.ext.compileSdkVersion

  defaultConfig {
    minSdkVersion rootProject.ext.minSdkVersion
  }

  // The config plugin copies the implementation into the app source set.
  sourceSets {
    main {
      java.srcDirs = []
      res.srcDirs = []
    }
  }
}

dependencies {
  implementation project(':expo-modules-core')
  implementation 'androidx.core:core:1.15.0'
}
